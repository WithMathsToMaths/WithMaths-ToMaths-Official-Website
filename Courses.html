<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WithMaths ToMaths - Courses</title>
    <link rel="stylesheet" href="Courses.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loader-wrapper">
        <div class="loader-content">
            <div class="reveal-text">
                <h3 class="logo-loader">WITHMATHS<span>TOMATHS</span></h3>
            </div>
            <div class="loader-bar-container">
                <div class="loader-bar"></div>
            </div>
        </div>
    </div>

    <div id="site-content">
        <section class="header">
            <div class="container">
                <div class="navbar">
                    <div class="menu">
                        <h3 class="logo">WithMaths<span>ToMaths</span></h3>
                        <div class="hamburger-menu">
                            <div class="bar"></div>
                        </div>
                    </div>
                </div>

                <div class="main-container">
                    <div class="main">
                        <header>
                            <div class="slider">
                                <div class="list">
                                    <div class="item"><img src="Images/1.png" class="shape-circle"></div>
                                    <div class="item">
                                        <div class="shape-square">
                                            <img src="Images/2.png" alt="MATHEMATICS">
                                        </div>
                                    </div>
                                    <div class="item"><img src="Images/3.png" class="shape-circle"></div>
                                </div>

                                <div class="mask-container">
                                    <div id="rotating-text" class="rotating-text"></div>
                                </div>

                                <div class="content">
                                    <button class="styling" id="main-button">
                                        <span class="btn-text">COMPUTER SCIENCE</span>
                                    </button>
                                </div>

                                <div class="arrows">
                                    <button id="prev">&lt;</button>
                                    <button id="next">&gt;</button>
                                </div>
                            </div>
                        </header>
                    </div>
                    <div class="shadow one"></div>
                    <div class="shadow two"></div>
                </div>

                <div class="links">
                    <ul class="nav-menu">
                        <li style="--i:6;"><a href="Homepage.html"><span>Home</span></a></li>
                        <li style="--i:5;"><a href="Courses.html"><span>Courses</span></a></li>
                        <li style="--i:4;"><a href="#"><span>Archives</span></a></li>
                        <li style="--i:3;"><a href="#"><span>About</span></a></li>
                        <li style="--i:2;"><a href="#"><span>Contact</span></a></li>
                        <li style="--i:1;"><a href="#"><span>Credits</span></a></li>
                    </ul>
                </div>
            </div>
        </section>
    </div>

    <audio id="click-sound" src="click.mp3" preload="auto"></audio>
    <script src="Courses.js"></script>
</body>
</html>
