<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WithMaths ToMaths - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Honk&family=Lora:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="banner">
        <div class="slider" style="--quantity: 3">
            <div class="item" style="--position: 1"><div class="greek-card" id="card-1"></div></div>
            <div class="item" style="--position: 2"><div class="greek-card" id="card-2"></div></div>
            <div class="item" style="--position: 3"><div class="greek-card" id="card-3"></div></div>
        </div>

        <div id="info-box" class="floating-box">
            <div class="social-icons">
                <a href="https://youtube.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="youtube"></a>
                <a href="https://facebook.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="facebook"></a>
                <a href="https://instagram.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="instagram"></a>
                <a href="https://linkedin.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/145/145807.png" alt="linkedin"></a>
                <a href="https://twitter.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3256/3256609.png" alt="twitter"></a>
                <a href="https://reddit.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/52/52053.png" alt="reddit"></a>
            </div>

            <h2 class="audiowide-regular construction-text">
                WEBSITE UNDER CONSTRUCTION<span class="dot-wave">...</span>
            </h2>

            <div id="full-countdown" class="audiowide-regular">
                <div class="time-unit"><span id="months">00</span><p>mois</p></div>
                <div class="time-unit"><span id="days">00</span><p>jours</p></div>
                <div class="time-unit"><span id="hours">00</span><p>heures</p></div>
                <div class="time-unit"><span id="minutes">00</span><p>min</p></div>
                <div class="time-unit"><span id="seconds">10</span><p>sec</p></div>
            </div>
        </div>

        <div id="welcome-cube" class="cube-container">
            <a href="Homepage.html" class="cube-button">
                <div class="cube">
                    <div class="top">Welcome</div>
                    <div>
                        <span style="--i:0"></span>
                        <span style="--i:1"></span>
                        <span style="--i:2"></span>
                        <span style="--i:3"></span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
