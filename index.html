<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WithMaths ToMaths - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Honk&family=Lora:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="banner">
        <div class="slider" style="--quantity: 3">
            <div class="item" style="--position: 1"><div class="greek-card" id="card-1"></div></div>
            <div class="item" style="--position: 2"><div class="greek-card" id="card-2"></div></div>
            <div class="item" style="--position: 3"><div class="greek-card" id="card-3"></div></div>
        </div>

        <div id="info-box" class="floating-box">
            <div class="social-icons">
                <a href="https://www.youtube.com/@MAZELEE" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="youtube">
                </a>
                <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="facebook"></a>
                <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="instagram"></a>
                <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/145/145807.png" alt="linkedin"></a>
                
                <a href="https://x.com" target="_blank" class="x-icon-link">
                    <svg class="x-svg" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"></path>
                    </svg>
                </a>
                
                <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/52/52053.png" alt="reddit"></a>
            </div>

            <h2 class="audiowide-regular construction-text">
                WEBSITE UNDER CONSTRUCTION<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
            </h2>

            <div id="full-countdown" class="audiowide-regular">
                <div class="time-unit"><span id="months">00</span><p>Months</p></div>
                <div class="time-unit"><span id="days">00</span><p>Days</p></div>
                <div class="time-unit"><span id="hours">00</span><p>Hrs</p></div>
                <div class="time-unit"><span id="minutes">00</span><p>Min</p></div>
                <div class="time-unit"><span id="seconds">00</span><p>Sec</p></div>
            </div>
        </div>

        <div id="welcome-cube" class="cube-container">
            <a href="Homepage.html" class="cube-button">
                <div class="cube">
                    <div class="top">Welcome</div>
                    <div>
                        <span style="--i:0"></span>
                        <span style="--i:1"></span>
                        <span style="--i:2"></span>
                        <span style="--i:3"></span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
